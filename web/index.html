<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cartile editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Toolbar -->
        <div id="toolbar">
            <span class="app-name">cartile editor</span>
            <div class="toolbar-spacer"></div>
            <div id="mode-toggle">
                <button id="btn-mode-view" class="mode-btn active" title="View mode">👁 View</button>
                <button id="btn-mode-paint" class="mode-btn" title="Paint mode">🖌 Paint</button>
            </div>
            <button id="btn-save" title="Save map" disabled>💾 Save</button>
            <button id="btn-open" title="Open files">📂 Open Files</button>
            <input type="file" id="file-input" multiple accept=".cartile,.json,.png,.jpg,.webp" hidden>
            <span id="zoom-display">100%</span>
        </div>

        <!-- Main area -->
        <div id="main">
            <!-- Canvas area (wraps canvas + tileset panel) -->
            <div id="canvas-area">
                <div id="canvas-container">
                    <canvas id="map-canvas"></canvas>
                    <!-- Welcome / drop zone overlay -->
                    <div id="welcome-overlay">
                        <div class="welcome-content">
                            <h2>cartile editor</h2>
                            <p>Drop files here to view a tilemap</p>
                            <p class="hint">Supports: .cartile, Tiled .json + tileset images (.png)</p>
                        </div>
                    </div>
                </div>
                <div id="tileset-panel" class="hidden">
                    <div id="tileset-panel-header">
                        <h3>Tileset</h3>
                        <select id="tileset-select"></select>
                        <button id="btn-toggle-tileset" title="Toggle tileset panel">▼</button>
                    </div>
                    <div id="tileset-panel-body">
                        <canvas id="tileset-canvas"></canvas>
                    </div>
                </div>
            </div>

            <!-- Side panel -->
            <div id="side-panel">
                <div class="panel-section">
                    <h3>Layers</h3>
                    <div id="layer-list"></div>
                </div>
                <div class="panel-section">
                    <h3>Map Info</h3>
                    <div id="map-info"></div>
                </div>
                <div class="panel-section">
                    <h3>Tile Properties</h3>
                    <div id="tile-props">
                        <span class="hint">Hover over a tile</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status bar -->
        <div id="status-bar">
            <span id="status-cursor">–</span>
            <span id="status-gid">–</span>
            <span id="status-layer">–</span>
            <span id="status-warnings"></span>
        </div>
    </div>

    <!-- Error toast -->
    <div id="toast" class="hidden"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
